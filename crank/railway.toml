# StakeSignal pyth resolver — runs on Railway as a worker service.
# Polls open Pyth-resolution markets every RESOLVE_CHECK_INTERVAL_MINUTES.

[build]
builder        = "NIXPACKS"
buildCommand   = "pip install -r requirements.txt"

[deploy]
startCommand        = "python -u pyth_resolver.py"
healthcheckPath     = ""
restartPolicyType   = "ALWAYS"
sleepApplication    = false
numReplicas         = 1
